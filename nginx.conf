# Rate limiting — protects the host NUC from network scanners on event Wi-Fi.
# Allows bursts of up to 20 requests, then caps at 30 requests/second per IP.
limit_req_zone $binary_remote_addr zone=kiosk:10m rate=30r/s;

server {
    # nginxinc/nginx-unprivileged requires a non-privileged port (8080)
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Apply rate limiting to all requests
    limit_req zone=kiosk burst=20 nodelay;

    # --- Security Headers ---

    # Prevent this page from being embedded in an iframe (clickjacking protection)
    add_header X-Frame-Options "DENY" always;

    # Prevent MIME-type sniffing (stops browsers from guessing content types)
    add_header X-Content-Type-Options "nosniff" always;

    # Content Security Policy — locks down asset sources to self only.
    # Adjust if you add external fonts, analytics, or CDN assets.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self';" always;

    # Referrer Policy — no referrer headers sent on navigation
    add_header Referrer-Policy "no-referrer" always;

    # Permissions Policy — disable browser features not needed by a kiosk
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # Remove Nginx version from error pages and headers
    server_tokens off;

    # --- Static Asset Caching ---

    # Cache static assets aggressively (JS/CSS/images are content-hashed by Vite)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # --- SPA Fallback ---

    # React Router requires all routes to serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Compression ---

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
}
